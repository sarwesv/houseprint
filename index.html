<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Floor House Design Tool</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; background: #ddd; }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      background: #d0d0d0;
      border-bottom: 2px solid #aaa;
      padding: 8px 12px;
      min-height: 48px;
    }
    .tool-group { display: flex; gap: 4px; }

    button {
      padding: 6px 13px;
      font-size: 13px;
      border: 1px solid #999;
      border-radius: 4px;
      background: white;
      cursor: pointer;
    }
    button:hover { background: #eee; }
    button.active { background: #4a90d9; color: white; border-color: #2a70b9; }

    select {
      padding: 5px 8px;
      font-size: 13px;
      border: 1px solid #999;
      border-radius: 4px;
      background: white;
      cursor: pointer;
    }
    label { font-size: 13px; color: #444; }
    .sep { width: 1px; height: 28px; background: #aaa; margin: 0 4px; }

    #btn-add-floor { background: #e0ffe0; border-color: #5aad5a; }
    #btn-delete    { background: #ffe0e0; border-color: #d9504a; display: none; }
    #btn-download  { background: #dff0ff; border-color: #4a90d9; }

    #hint {
      margin-left: auto;
      font-size: 12px;
      color: #666;
      font-style: italic;
      white-space: nowrap;
    }

    /* ── Canvas area ── */
    #canvas-container {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }

    #canvas {
      display: block;
      cursor: crosshair;
      background-color: white;
      background-image:
        linear-gradient(rgba(180,180,180,0.4) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180,180,180,0.4) 1px, transparent 1px);
      background-size: 20px 20px;
      box-shadow: 2px 2px 12px rgba(0,0,0,0.25);
    }

    /* ── SVG element classes (styled via CSS, not inline attrs) ── */
    .design-rect {
      stroke: #222;
      stroke-width: 2;
      cursor: pointer;
    }
    .design-line {
      fill: none;
      stroke: #222;
      stroke-width: 2.5;
      cursor: pointer;
    }
    .design-text {
      fill: #111;
      font-family: Arial, sans-serif;
      cursor: pointer;
      user-select: none;
    }

    /* ── Selection overlay ── */
    .selected-outline {
      fill: none;
      stroke: #2277dd;
      stroke-width: 1.5;
      stroke-dasharray: 5 3;
      pointer-events: none;
    }
    .control-handle {
      fill: white;
      stroke: #2277dd;
      stroke-width: 2;
      cursor: se-resize;
    }
    .bend-handle {
      fill: #ff7700;
      stroke: white;
      stroke-width: 1.5;
      cursor: grab;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <div class="tool-group">
    <button id="tool-select" class="active" onclick="setTool('select')">Select / Move</button>
    <button id="tool-shape"  onclick="setTool('shape')">Draw Room</button>
    <button id="tool-line"   onclick="setTool('line')">Draw Wall</button>
    <button id="tool-text"   onclick="setTool('text')">Add Label</button>
  </div>

  <div class="sep"></div>

  <label>Fill:
    <select id="fill-select" onchange="updateFillColor(this.value)">
      <option value="none">None</option>
      <option value="#ffffff">White</option>
      <option value="#dce8ff">Blue</option>
      <option value="#fffce0">Yellow</option>
      <option value="#e8f5e9">Green</option>
      <option value="#f5e8ff">Purple</option>
      <option value="#ffe8e8">Pink</option>
      <option value="#e8e8e8">Gray</option>
    </select>
  </label>

  <div class="sep"></div>

  <label for="floor-select">Floor:</label>
  <select id="floor-select" onchange="switchFloor(this.value)"></select>
  <button id="btn-add-floor" onclick="addNewFloor()">+ Add Floor</button>

  <div class="sep"></div>

  <button id="btn-delete"   onclick="deleteActiveElement()">Delete Selected</button>
  <button id="btn-download" onclick="downloadPDF()">Download PDF</button>

  <span id="hint">Drag corner handle to resize &nbsp;·&nbsp; Drag orange handle to bend walls &nbsp;·&nbsp; Delete / Backspace to remove</span>
</div>

<div id="canvas-container">
  <svg id="canvas" width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
    <g id="selection-layer"></g>
  </svg>
</div>

<script src="main.js"></script>
</body>
</html>
