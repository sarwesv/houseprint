<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Floor House Design Tool</title>
  <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJz48dGV4dCB5PScuOWVtJyBmb250LXNpemU9JzkwJz7wn4+gPC90ZXh0Pjwvc3ZnPg==">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; background: #060f1e; }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      background: #0a1628;
      border-bottom: 1px solid #1a3a6e;
      padding: 8px 12px;
      min-height: 48px;
    }
    .tool-group { display: flex; gap: 4px; }

    button {
      padding: 6px 13px;
      font-size: 13px;
      border: 1px solid #1e3f7a;
      border-radius: 4px;
      background: #0d1f3c;
      color: #6aaee8;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover { background: #142a52; border-color: #4a90d9; color: #a8d4ff; }
    button.active { background: #0e3060; color: #5bc8ff; border-color: #5bc8ff; }

    select {
      padding: 5px 8px;
      font-size: 13px;
      border: 1px solid #1e3f7a;
      border-radius: 4px;
      background: #0d1f3c;
      color: #6aaee8;
      cursor: pointer;
    }
    select option { background: #0d1f3c; color: #6aaee8; }

    label { font-size: 13px; color: #4a7aaa; }
    .sep { width: 1px; height: 28px; background: #1a3a6e; margin: 0 4px; }

    #btn-add-floor { border-color: #1e6e3a; color: #4dd88a; }
    #btn-add-floor:hover { background: #0a2218; border-color: #2ea85a; }
    #btn-delete    { border-color: #6e1e1e; color: #ff7070; display: none; }
    #btn-delete:hover { background: #220a0a; border-color: #cc3333; }
    #btn-download  { border-color: #1e4a8a; color: #5bc8ff; }
    #btn-download:hover { background: #0e2a52; }

    #hint {
      margin-left: auto;
      font-size: 12px;
      color: #2a4a6e;
      font-style: italic;
      white-space: nowrap;
    }

    #version-badge {
      position: fixed;
      bottom: 8px;
      left: 10px;
      font-size: 11px;
      color: #1e3a6e;
      pointer-events: none;
      user-select: none;
    }

    /* ── Canvas area ── */
    #canvas-container {
      flex: 1;
      overflow: auto;
      padding: 16px;
      background: #060f1e;
    }

    #canvas {
      display: block;
      cursor: crosshair;
      background-color: #0a1628;
      background-image:
        linear-gradient(rgba(40,100,200,0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(40,100,200,0.18) 1px, transparent 1px);
      background-size: 20px 20px;
      box-shadow: 0 0 40px rgba(0,80,200,0.2);
    }

    /* ── SVG element classes ── */
    .design-rect {
      stroke: #5aaff0;
      stroke-width: 2;
      cursor: pointer;
      pointer-events: all;
    }
    .design-line {
      fill: none;
      stroke: #5bc8ff;
      stroke-width: 2.5;
      cursor: pointer;
      pointer-events: stroke;
    }
    .design-text {
      fill: #c0e0ff;
      font-family: Arial, sans-serif;
      cursor: pointer;
      user-select: none;
    }

    /* ── Selection overlay ── */
    .selected-outline {
      fill: none;
      stroke: #5bc8ff;
      stroke-width: 1.5;
      stroke-dasharray: 5 3;
      pointer-events: none;
    }
    .control-handle {
      fill: #0a1628;
      stroke: #5bc8ff;
      stroke-width: 2;
      cursor: se-resize;
    }
    .bend-handle {
      fill: #ff9900;
      stroke: #0a1628;
      stroke-width: 1.5;
      cursor: grab;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <div class="tool-group">
    <button id="tool-select" class="active" onclick="setTool('select')">Select / Move</button>
    <button id="tool-shape"  onclick="setTool('shape')">Draw Room</button>
    <button id="tool-line"   onclick="setTool('line')">Draw Wall</button>
    <button id="tool-text"   onclick="setTool('text')">Add Label</button>
  </div>

  <div class="sep"></div>

  <label>Fill:
    <select id="fill-select" onchange="updateFillColor(this.value)">
      <option value="none">None</option>
      <option value="#c8e0ff">Sky</option>
      <option value="#b0f0d8">Mint</option>
      <option value="#fff0a0">Amber</option>
      <option value="#e0b8ff">Violet</option>
      <option value="#ffb8b8">Rose</option>
      <option value="#b8e8ff">Cyan</option>
      <option value="#d0d8e8">Stone</option>
    </select>
  </label>

  <div class="sep"></div>

  <label for="floor-select">Floor:</label>
  <select id="floor-select" onchange="switchFloor(this.value)"></select>
  <button id="btn-add-floor" onclick="addNewFloor()">+ Add Floor</button>

  <div class="sep"></div>

  <button id="btn-delete"   onclick="deleteActiveElement()">Delete Selected</button>
  <button id="btn-download" onclick="downloadPDF()">Download PDF</button>

  <span id="hint">Drag corner handle to resize &nbsp;·&nbsp; Drag orange handle to bend walls &nbsp;·&nbsp; Delete / Backspace to remove</span>
</div>

<div id="canvas-container">
  <svg id="canvas" width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
    <g id="selection-layer"></g>
  </svg>
</div>

<div id="version-badge"></div>
<script src="main.js"></script>
</body>
</html>
